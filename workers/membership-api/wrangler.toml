name = "ugk-membership-api"
main = "src/index.ts"
compatibility_date = "2026-07-09"

[secrets]
required = [
  "GOOGLE_CLIENT_ID",
  "REVENUECAT_SECRET_API_KEY",
  "REVENUECAT_WEBHOOK_AUTH",
  "REVENUECAT_WEBHOOK_SECRET",
  "SESSION_SECRET",
  "ACCESS_TEAM_DOMAIN",
  "ACCESS_AUD",
]

[[d1_databases]]
binding = "DB"
database_name = "ugk-membership"
database_id = "dffc1d4d-ad26-416d-a796-9ba6dc5f0e20"

[[r2_buckets]]
binding = "AVATAR_BUCKET"
bucket_name = "ugk-profile-avatars"
