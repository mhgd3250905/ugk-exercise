name: ugk_exercise
description: 俯卧撑检测 App — 端侧 MoveNet 推理 + 状态机计数。
publish_to: 'none'
version: 0.4.0+26

environment:
  sdk: ^3.8.0
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter

  # 相机实时流
  camera: ^0.11.0+2

  # 端侧 TFLite 推理 (TensorFlow 官方维护)
  tflite_flutter: ^0.12.0

  # 本地训练记录/识别诊断临时文件
  path_provider: ^2.1.4

  # 文件/路径
  path: ^1.9.0

  file_picker: ^11.0.2
  image_picker: ^1.2.1
  image_cropper: ^12.2.1
  audioplayers: ^6.6.0
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  http: ^1.6.0
  flutter_secure_storage: ^10.3.1
  google_sign_in: ^7.2.0
  purchases_flutter: ^10.4.1
  flutter_localizations:
    sdk: flutter
  intl: any
  url_launcher: ^6.3.2
  in_app_update: ^4.2.5
  package_info_plus: ^8.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  analyzer: ^12.1.0
  camera_platform_interface: ^2.12.0
  audioplayers_platform_interface: ^7.1.1
  flutter_lints: ^4.0.0
  test: ^1.25.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/models/
    - assets/audio/prompts/
    - assets/audio/voices/manbo/en/
    - assets/images/
    - assets/fonts/OFL-BebasNeue.txt

  fonts:
    - family: BebasNeue
      fonts:
        - asset: assets/fonts/BebasNeue-Regular.ttf
