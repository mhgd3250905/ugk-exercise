name: ugk_exercise
description: 俯卧撑检测 App — 端侧 MoveNet 推理 + 状态机计数。
publish_to: 'none'
version: 0.3.0

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # 相机实时流
  camera: ^0.11.0+2

  # 端侧 TFLite 推理 (TensorFlow 官方维护)
  tflite_flutter: ^0.12.0

  # 离线视频回放报告/临时文件
  path_provider: ^2.1.4

  # 文件/路径
  path: ^1.9.0

  ffmpeg_kit_flutter_new: ^4.3.2
  file_picker: ^11.0.2
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  test: ^1.25.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/audio/prompts/
